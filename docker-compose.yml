services:
  catalogo:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/catalogo.db"
      NEXTAUTH_SECRET: "cambia-esto-en-produccion"
      NEXTAUTH_URL: "http://localhost:3000"
    volumes:
      - ./data:/data
      - ./uploads:/app/public/uploads
    restart: unless-stopped

